name: smart_extinguisher_app
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ✅ 1. 서버 통신 (로그인, 소화기 데이터)
  http: ^1.2.0 # (또는 최신 버전)
  
  # ✅ 2. 로컬 저장소 (로그인 토큰 저장)
  shared_preferences: ^2.2.2
  
  # ✅ 3. 소화기 고유 ID 생성 (모델에서 필요할 수 있음)
  uuid: ^4.2.1 
  
  # ✅ 4. 블루투스
  flutter_blue_plus: ^1.34.5
  permission_handler: ^11.3.1
  
  # ✅ 5. 이미지 선택
  image_picker: ^1.2.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true